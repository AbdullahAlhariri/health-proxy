services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      MONGODB_URI: mongodb://mongo:27017/healthdata
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET in .env}
      TIMEZONE: ${TIMEZONE:-Europe/Amsterdam}
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    # Not exposed to the host on purpose — only the app container reaches it.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
